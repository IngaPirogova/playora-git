    <header class=header>

            <h1>
                <a href=/playora-git/index.html class=logo>Playora</a>
            </h1>
    
            <form class=search-form>
                <input id=search-input placeholder="Search games..." class=search-input>
            </form>          

            <nav class=nav>
                <a href=/playora-git/library.html class=nav__link>Library</a>
                
                 <button id=auth-btn class=nav__btn>Login</button>
<span id=user-email class="hidden user-email"></span>
<button id=logout-btn class="hidden nav__btn">Logout</button>
                <button id=theme-toggle class=nav__btn>🌙</button>
            </nav>    
        </div>



<div class=header__wave>
    <svg preserveAspectRatio=none viewBox="0 0 1440 320"><defs><linearGradient id=waveGradient x1=0 x2=1 y1=0 y2=0><stop offset=0% stop-color=#0b1224 /><stop offset=40% stop-color=#1e3a8a /><stop offset=70% stop-color=#6d28d9 /><stop offset=100% stop-color=#ff4d6d /></linearGradient></defs><path fill=url(#waveGradient) d="M0 160c240 0 480-120 720-130 240 10 480 170 720 10v280H0Z"/></svg>
</div>

    </header>
<div id=loader class="hidden loader"></div>

    <ul id=list></ul>

    <div id=pagination>
        <button id=prev>⬅</button>
        <span id=page-info></span>
        <button id=next>➡</button>
    </div>

    <div class=modal id=modal>
        <div id=modal-content></div>
    </div>

        <div class=auth-box>

                <input type=password id=auth-password autocomplete=auth-password placeholder=Password required>
    
                <button class=auth-submit>Login</button>
            </form>
    
            <p class=auth-switch>
