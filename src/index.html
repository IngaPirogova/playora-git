<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playora</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">

    <!-- <link rel="stylesheet" href="./css/style.css"> -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/main.css.map">

    <link rel="icon" type="image/png" href="favicon.ico">


</head>

<body>
    <header class="header">
        <div class="container header__inner">
    
            <h1>
                <a href="./index.html" class="logo">Playora</a>
            </h1>
    
            <form class="search-form">
                <input type="text" id="search-input" placeholder="Search games..." class="search-input" />
            </form>          

            <nav class="nav">
                <a href="./library.html" class="nav__link">Library</a>
                
                 <button id="auth-btn" class="nav__btn">Login</button>
<span id="user-email" class="user-email hidden"></span>
<button id="logout-btn" class="nav__btn hidden">Logout</button>
                <button id="theme-toggle" class="nav__btn">🌙</button>
            </nav>    
        </div>


<!-- ВОЛНА -->
<div class="header__wave">
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
        <defs>
            <linearGradient id="waveGradient" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#0b1224" />
                <stop offset="40%" stop-color="#1e3a8a" />
                <stop offset="70%" stop-color="#6d28d9" />
                <stop offset="100%" stop-color="#ff4d6d" />
            </linearGradient>
        </defs>
    <!-- <path d="M0,160 C240,260 480,80 720,140 C960,200 1200,260 1440,140 L1440,320 L0,320 Z" fill="url(#waveGradient)">
    </path> -->

    <path d="M0,160 C240,160 480,40 720,30 C960,40 1200,200 1440,40 L1440,320 L0,320 Z" fill="url(#waveGradient)">
    </path>
    </svg>
</div>

    </header>
<div id="loader" class="loader hidden"></div>

    <ul id="list"></ul>

    <div id="pagination">
        <button id="prev">⬅</button>
        <span id="page-info"></span>
        <button id="next">➡</button>
    </div>

    <div class="modal" id="modal">
        <div id="modal-content"></div>
    </div>


    <div id="auth-modal" class="auth-modal hidden">
        <div class="auth-box">
    
            <h2 id="auth-title">Login</h2>
    
            <form id="auth-form">
                <input type="email" id="auth-email" autoComplete="email" placeholder="Email" required />
    
                <input type="password" id="auth-password" autoComplete="current-password" placeholder="Password" required />
    
                <button type="submit" class="auth-submit">Login</button>
            </form>
    
            <p class="auth-switch">
                No account?
                <span id="switch-mode">Register</span>
            </p>
    
            <button id="auth-close">✖</button>
    
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>

</html>
