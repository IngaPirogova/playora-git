<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playora</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
<header class="header">
    <div class="container header__inner">
        
        <h1><a href="./index.html" class="logo">Playora</a></h1>

        <nav class="nav">
           
            <div class="library-controls">
                <button id="favorites-btn" class="tab active">Favorites</button>
                <button id="played-btn" class="tab">Played</button>
            </div>

            <a href="index.html" class="nav__link">Home</a>
        </nav>
    </div>


    <!-- ВОЛНА -->
    <div class="header__wave">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <defs>
                <linearGradient id="waveGradient" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#0b1224" />
                    <stop offset="40%" stop-color="#1e3a8a" />
                    <stop offset="70%" stop-color="#6d28d9" />
                    <stop offset="100%" stop-color="#ff4d6d" />
                </linearGradient>
            </defs>
               
            <path d="M0,160 C240,160 480,40 720,30 C960,40 1200,200 1440,40 L1440,320 L0,320 Z" fill="url(#waveGradient)">
            </path>
        </svg>
    </div>
</header>

<main class="container">

   

    <ul id="library-list"></ul>

</main>

<script type="module" src="./js/library.js"></script>
</body>

</html>
